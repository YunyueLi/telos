name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web deps
        run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Build static export
        run: npm run build
        working-directory: web
        env:
          # 账号/跨设备同步：在 repo Settings → Secrets and variables → Actions → Variables 添加这两项即生效。
          # anon key 公开可暴露（受 RLS 保护）；未设置则线上自动回退本地优先。见 SUPABASE.md。
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # 线上倒推端点（Cloudflare Worker /derive）。未设则线上无法倒推。见 HANDOFF P0。
          NEXT_PUBLIC_TELOS_DERIVE_URL: ${{ vars.NEXT_PUBLIC_TELOS_DERIVE_URL }}

      - name: Assemble site (landing at /, demo at /app)
        run: |
          rm -rf deploy
          mkdir -p deploy/app
          cp -R landing/. deploy/
          cp -R web/out/. deploy/app/
          touch deploy/.nojekyll
          echo telos.ungetsu.net > deploy/CNAME

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          user_name: YunyueLi
          user_email: 44204222+YunyueLi@users.noreply.github.com
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
