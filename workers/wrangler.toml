name = "telos-derive"
main = "derive.js"
compatibility_date = "2024-11-01"

# ── 托管 AI 用量表（KV）──
# 开通托管模式（用户登录即用、按账号计量）需要这个 KV：
#   npx wrangler kv namespace create TELOS_USAGE
# 把命令输出的 id 填到下面并取消注释；不配置则托管模式自动关闭（NO_HOSTED），BYOK 不受影响。
# [[kv_namespaces]]
# binding = "TELOS_USAGE"
# id = "<paste-id-here>"

# 非敏感默认值（可改）。API key 不放这里——用 `wrangler secret put TELOS_LLM_API_KEY` 设置。
[vars]
TELOS_LLM_BASE_URL = "https://api.deepseek.com"
# deepseek-v4-pro（最强）/ deepseek-v4-flash（更快更省）。代码对 v4 自动走非思考模式。
TELOS_LLM_MODEL = "deepseek-v4-pro"
# 联网检索（#4/#5）：provider 非敏感放这里；key 用 `wrangler secret put TELOS_SEARCH_API_KEY`。
TELOS_SEARCH_PROVIDER = "tavily"
# 跨域来源收紧到线上站点，降低被盗刷（本地开发走 serve.py，不经此 Worker）。
ALLOW_ORIGIN = "https://yunyueli.github.io"
# ── Telos Pro 计费（/billing/webhook 用）──
# 服务商：creem | lemonsqueezy（须与 web/lib/telos/billing-config.ts 的 provider 一致）
BILLING_PROVIDER = "creem"
# Supabase 项目 URL（非敏感；service_role 绝不放这里）。两个 secret 用命令设置：
#   npx wrangler secret put BILLING_WEBHOOK_SECRET     ← 服务商 webhook 签名密钥
#   npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY  ← Supabase service_role（写 app_metadata 用）
SUPABASE_URL = "https://gbvetfyudlbdiydapipr.supabase.co"
# Supabase publishable/anon key（公开值，验证用户 token 用——托管模式身份校验）
SUPABASE_ANON_KEY = "sb_publishable_1wSDq-mSXJMhJ9gppIx7gg_S8Ta--6G"
# ── 托管配额（可调）──：Pro 月度 / Free 试用(账号总量)。d=倒推 l=微课·出题
HOSTED_PRO_DERIVES = "30"
HOSTED_PRO_LESSONS = "600"
HOSTED_TRIAL_DERIVES = "3"
HOSTED_TRIAL_LESSONS = "60"
